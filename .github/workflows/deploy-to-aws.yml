name: Deploy to AWS S3
'on':
  push:
    branches:
      - master
env:
  BUILD_FOLDER: ${{ vars.BUILD_FOLDER }}

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    environment: production
    name: Build & Deploy Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          set -e
          cat > .env <<'EOF'
          VITE_FB_API_KEY=${{ secrets.VITE_FB_API_KEY }}
          VITE_FB_AUTH_DOMAIN=${{ secrets.VITE_FB_AUTH_DOMAIN }}
          VITE_FB_PROJECT_ID=${{ secrets.VITE_FB_PROJECT_ID }}
          VITE_FB_STORAGE_BUCKET=${{ secrets.VITE_FB_STORAGE_BUCKET }}
          VITE_FB_MESSAGING_SENDER_ID=${{ secrets.VITE_FB_MESSAGING_SENDER_ID }}
          VITE_FB_APP_ID=${{ secrets.VITE_FB_APP_ID }}
          VITE_FB_MEASUREMENT_ID=${{ secrets.VITE_FB_MEASUREMENT_ID }}
          EOF
          echo '.env written'

      - name: Show sanitized env (debug)
        run: |
          sed -E 's/(=).+$/=***REDACTED***/' .env

      - name: Install & Build
        run: |
          yarn install --frozen-lockfile
          yarn build
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ZONDA }}
          aws-region: ${{ vars.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: "Deploy to AWS"
        run: |
          echo "Deploying to AWS to ${{ vars.DEPLOY_CONFIG }}"
          aws s3 sync ${{ env.BUILD_FOLDER }} s3://${{ vars.DEPLOY_CONFIG }} --delete
